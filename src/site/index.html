<body><main><p class="tag">OPEN SOURCE · GOOGLE WORKSPACE</p><h1>讓每一場演講，<br>都有人記得下一步。</h1><p class="lead">給大專校院教師與課程助理使用的演講課工作台。場次、講者、待辦與學期週曆，放在自己的 Google Workspace。</p><div class="actions"><a class="primary" href="demo.html?demo=1">開啟假資料 Demo</a><a href="setup/">建立課程設定</a><a href="https://github.com/cwstedctw/talk-course-manager">查看 GitHub</a></div><section><h2>第一階段</h2><div class="cards"><article><b>同校多人協作</b><p>以學校 Google Workspace 網域與 Users 白名單雙層把關。</p></article><article><b>資料留在自己手上</b><p>正式資料只進課程自己的私有 Google Sheet。</p></article><article><b>設定可以請 AI 幫忙</b><p>AI 只產生有來源的草稿，教師確認後才匯入。</p></article></div></section><p class="foot">目前為 alpha；不屬於任何學校的正式校務或會計系統。</p></main></body></html>
