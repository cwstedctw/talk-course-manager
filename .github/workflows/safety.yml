name: safety

on:
  push:
  pull_request:

jobs:
  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block private project markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE \
            --exclude-dir=.git \
            --exclude='safety.yml' \
            '(gms\.ndhu\.edu\.tw|docs\.google\.com/spreadsheets/d/|script\.google\.com/macros/s/AKfy|1LyfUWA3C|19I2-BIjF)' .; then
            echo 'Private or institution-specific marker found.'
            exit 1
          fi

