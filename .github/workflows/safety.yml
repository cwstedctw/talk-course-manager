name: safety

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
